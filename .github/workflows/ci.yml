name: CI
on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop ]
jobs:
  addon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y luarocks
      - run: luarocks install luacheck
      - name: Lint Lua (with .luacheckrc)
        run: luacheck addon/AICompanion --config .luacheckrc

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff black pytest
      - name: Ruff (with ruff.toml)
        run: ruff check external/python --config ruff.toml
      - name: Black check
        run: black --check external/python
      - name: Pytest (no tests yet; should pass)
        run: pytest -q || true
