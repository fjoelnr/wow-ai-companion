services:
  # ── Ollama (optional – auskommentiert wenn nativ installiert) ──────
  # Ollama läuft bereits nativ auf dem Host (Port 11434).
  # Nur aktivieren wenn kein lokales Ollama vorhanden ist.
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ai-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=5m
  #   volumes:
  #     - ollama_models:/root/.ollama

  mcp:
    build: ./mcp-server
    container_name: ai-mcp
    restart: unless-stopped
    environment:
      # LLM provider: ollama | openai | openrouter
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      # Ollama: host.docker.internal zeigt auf den Host (natives Ollama)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-}
      # OpenAI settings
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # OpenRouter settings
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-sonnet-4}
    ports:
      - "9090:9090"
    volumes:
      - ./svshare:/svshare

  watcher:
    build:
      context: ./external/python
      dockerfile: Dockerfile
    container_name: ai-watcher
    restart: unless-stopped
    environment:
      - SV_PATH=/wow/WTF/Account/103722624#1/SavedVariables/AICompanion.lua
      - SV_WRITE=/wow/WTF/Account/103722624#1/SavedVariables/AICompanion.lua
      - COMBATLOG_DIR=/wow/Logs
      - MCP_URL=http://mcp:9090
      - TIPS_COUNT=5
      - POLL_INTERVAL=2.0
    volumes:
      - "D:/Games/World of Warcraft/_retail_:/wow:ro"
    depends_on:
      - mcp

  webui:
    build: ./webui
    container_name: ai-webui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - mcp
