[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "wow-ai-companion-watcher"
version = "0.1.0"
description = "External watcher for WoW AI Companion"
requires-python = ">=3.12"
dependencies = [
  "requests>=2.32",
  "watchdog>=4.0",
]

[tool.black]
line-length = 100
